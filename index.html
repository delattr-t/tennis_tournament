<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Tournoi de Tennis</title>

  <!-- PWA -->
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#1a1a18" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Tennis" />

  <!-- Icons -->
  <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png" />
  <link rel="apple-touch-icon" href="/icons/icon-192.png" />

  <!-- Open Graph (partage WhatsApp/réseaux) -->
  <meta property="og:title" content="Tournoi de Tennis" />
  <meta property="og:description" content="Rejoignez le tournoi et suivez le tableau en direct !" />
  <meta property="og:image" content="/icons/icon-512.png" />
  <meta property="og:type" content="website" />

  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <div id="root"></div>

    <!-- Stries herbe -->
    <line x1="20" y1="0" x2="18" y2="800" stroke="#3A7A26" stroke-width="6" opacity="0.3"/>
    <line x1="45" y1="0" x2="47" y2="800" stroke="#247018" stroke-width="4" opacity="0.22"/>
    <line x1="70" y1="0" x2="68" y2="800" stroke="#3A7A26" stroke-width="3" opacity="0.18"/>
    <line x1="92" y1="0" x2="94" y2="800" stroke="#247018" stroke-width="2" opacity="0.14"/>
    <!-- Ligne orange crayon -->
    <path d="M 114 0 Q 122 130 106 280 Q 92 430 118 580 Q 136 700 108 800" fill="none" stroke="#E8640A" stroke-width="5" stroke-linecap="round" opacity="0.95"/>
    <path d="M 116 0 Q 124 128 108 276 Q 94 428 120 578 Q 138 698 110 800" fill="none" stroke="#E8640A" stroke-width="2" stroke-linecap="round" opacity="0.45"/>
    <!-- Balle haut droite (dans le vert) -->
    <circle cx="58" cy="110" r="28" fill="#C8D62A"/>
    <circle cx="58" cy="110" r="28" fill="none" stroke="#B0BE1A" stroke-width="1.5"/>
    <path d="M 34 98 Q 58 118 82 98" fill="none" stroke="#8FA010" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M 34 122 Q 58 102 82 122" fill="none" stroke="#8FA010" stroke-width="2.5" stroke-linecap="round"/>
    <ellipse cx="46" cy="98" rx="8" ry="4" fill="#DCF040" opacity="0.5"/>
  </svg>

  <svg id="deco-right" style="position:fixed;top:0;right:0;width:130px;height:100%;z-index:0;pointer-events:none;overflow:visible" preserveAspectRatio="none" viewBox="0 0 130 800" xmlns="http://www.w3.org/2000/svg">
    <!-- Bande verte -->
    <path d="M 130 0 L 15 0 Q 8 100 22 200 Q 34 350 10 500 Q -8 620 20 800 L 130 800 Z" fill="#2D6A1F"/>
    <!-- Stries herbe -->
    <line x1="110" y1="0" x2="112" y2="800" stroke="#3A7A26" stroke-width="6" opacity="0.3"/>
    <line x1="85" y1="0" x2="83" y2="800" stroke="#247018" stroke-width="4" opacity="0.22"/>
    <line x1="60" y1="0" x2="62" y2="800" stroke="#3A7A26" stroke-width="3" opacity="0.18"/>
    <line x1="38" y1="0" x2="36" y2="800" stroke="#247018" stroke-width="2" opacity="0.14"/>
    <!-- Ligne orange crayon -->
    <path d="M 16 0 Q 8 130 24 280 Q 38 430 12 580 Q -6 700 22 800" fill="none" stroke="#E8640A" stroke-width="5" stroke-linecap="round" opacity="0.95"/>
    <path d="M 14 0 Q 6 128 22 276 Q 36 428 10 578 Q -8 698 20 800" fill="none" stroke="#E8640A" stroke-width="2" stroke-linecap="round" opacity="0.45"/>
    <!-- Balle milieu bas gauche (dans le vert) -->
    <circle cx="72" cy="490" r="26" fill="#C8D62A"/>
    <circle cx="72" cy="490" r="26" fill="none" stroke="#B0BE1A" stroke-width="1.5"/>
    <path d="M 49 479 Q 72 498 95 479" fill="none" stroke="#8FA010" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M 49 501 Q 72 482 95 501" fill="none" stroke="#8FA010" stroke-width="2.5" stroke-linecap="round"/>
    <ellipse cx="60" cy="479" rx="7" ry="4" fill="#DCF040" opacity="0.5"/>
  </svg>

  <!-- Supabase SDK -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <!-- App -->
  <script src="/app.js"></script>

  <!-- Service Worker + PWA install -->
  <script>
    // ---- Service Worker ----
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js')
          .then(reg => {
            console.log('SW registered:', reg.scope);
            window._swRegistration = reg;
          })
          .catch(err => console.warn('SW error:', err));
      });
    }

    // ---- PWA Install Prompt ----
    let _deferredInstallPrompt = null;
    window.addEventListener('beforeinstallprompt', e => {
      e.preventDefault();
      _deferredInstallPrompt = e;
      window.dispatchEvent(new CustomEvent('pwa-installable'));
    });

    window.addEventListener('appinstalled', () => {
      _deferredInstallPrompt = null;
      window.dispatchEvent(new CustomEvent('pwa-installed'));
    });

    // Expose globally
    window.triggerInstallPrompt = async () => {
      if (!_deferredInstallPrompt) return false;
      _deferredInstallPrompt.prompt();
      const { outcome } = await _deferredInstallPrompt.userChoice;
      _deferredInstallPrompt = null;
      return outcome === 'accepted';
    };

    window.canInstallPWA = () => !!_deferredInstallPrompt;

    window.isIOS = () => /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;

    window.isStandalone = () =>
      window.matchMedia('(display-mode: standalone)').matches ||
      window.navigator.standalone === true;
  </script>
</body>
</html>
