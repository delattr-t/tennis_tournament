<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Tournoi de Tennis</title>

  <!-- PWA -->
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#1a1a18" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Tennis" />

  <!-- Icons -->
  <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png" />
  <link rel="apple-touch-icon" href="/icons/icon-192.png" />

  <!-- Open Graph (partage WhatsApp/réseaux) -->
  <meta property="og:title" content="Tournoi de Tennis" />
  <meta property="og:description" content="Rejoignez le tournoi et suivez le tableau en direct !" />
  <meta property="og:image" content="/icons/icon-512.png" />
  <meta property="og:type" content="website" />

  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <div id="root"></div>

  <!-- Supabase SDK -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <!-- App -->
  <script src="/app.js"></script>

  <!-- Service Worker + PWA install -->
  <script>
    // ---- Service Worker ----
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js')
          .then(reg => {
            console.log('SW registered:', reg.scope);
            window._swRegistration = reg;
          })
          .catch(err => console.warn('SW error:', err));
      });
    }

    // ---- PWA Install Prompt ----
    let _deferredInstallPrompt = null;
    window.addEventListener('beforeinstallprompt', e => {
      e.preventDefault();
      _deferredInstallPrompt = e;
      window.dispatchEvent(new CustomEvent('pwa-installable'));
    });

    window.addEventListener('appinstalled', () => {
      _deferredInstallPrompt = null;
      window.dispatchEvent(new CustomEvent('pwa-installed'));
    });

    // Expose globally
    window.triggerInstallPrompt = async () => {
      if (!_deferredInstallPrompt) return false;
      _deferredInstallPrompt.prompt();
      const { outcome } = await _deferredInstallPrompt.userChoice;
      _deferredInstallPrompt = null;
      return outcome === 'accepted';
    };

    window.canInstallPWA = () => !!_deferredInstallPrompt;

    window.isIOS = () => /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;

    window.isStandalone = () =>
      window.matchMedia('(display-mode: standalone)').matches ||
      window.navigator.standalone === true;
  </script>
</body>
</html>
